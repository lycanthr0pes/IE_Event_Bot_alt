name: PR Target Guard

on:
  pull_request:
    branches: [main, develop]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce base branch rules by head branch prefix
        run: |
          HEAD="${{ github.event.pull_request.head.ref }}"
          BASE="${{ github.event.pull_request.base.ref }}"
          echo "HEAD=$HEAD"
          echo "BASE=$BASE"

          case "$HEAD" in
            feature/*)
              EXPECTED_BASE="develop"
              ;;
            release/*|hotfix/*)
              EXPECTED_BASE="main"
              ;;
            sync/*)
              EXPECTED_BASE="develop"
              ;;
            *)
              echo "::error::Unsupported head branch '$HEAD'. Allowed prefixes: feature/*, release/*, hotfix/*, sync/*"
              exit 1
              ;;
          esac

          if [[ "$BASE" != "$EXPECTED_BASE" ]]; then
            echo "::error::$HEAD PR must target $EXPECTED_BASE (got $BASE)"
            exit 1
          fi

          echo "OK"
